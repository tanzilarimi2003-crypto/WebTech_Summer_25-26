<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="Design" href="/Design/Design.css">
    <title>Login Form</title>
    <script src="/JavaScript/Script.js"></script>
</head>
<body>
    <div class="container">
        <h1>Login Form</h1>
        <form onsubmit="return login()">

            <table>
                <tr>
                    <td>Username:</td>
                    <td>
                        <input type="text" id="username">
                        <p id="UserError"></p>
                    </td>
                </tr>

                <tr>
                    <td>Password:</td>
                    <td>
                        <input type="text" id="password">
                        <p id="PasswordError"></p>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <p id="LoginMessage"></p>
                    </td>
                     
                </tr>

                <tr>
                    <td>
                        <input type="submit" value="Login">
                    </td>

                    <td>
                        <input type="reset">
                    </td>
                </tr>

            </table>
        </form>
    </div>
    
</body>
</html>
